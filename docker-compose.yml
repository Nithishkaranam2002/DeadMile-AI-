# DeadMile AI — Docker Compose (19 containers)
# Usage: cp .env.example .env && make up

services:
  # ===========================================================================
  # Infrastructure — Data Stores
  # ===========================================================================
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: deadmile-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deadmile}
      POSTGRES_USER: ${POSTGRES_USER:-deadmile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deadmile_secret_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deadmile} -d ${POSTGRES_DB:-deadmile}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: deadmile-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: deadmile-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"all shards are ready\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  minio:
    profiles: ["full"]
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: deadmile-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-deadmile_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-deadmile_minio_secret_change_me}
    volumes:
      - minio-data:/data
    networks:
      - deadmile-network

  # ===========================================================================
  # Infrastructure — Event Streaming
  # ===========================================================================
  zookeeper:
    profiles: ["full"]
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: deadmile-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - kafka-data:/var/lib/zookeeper/data
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  kafka:
    profiles: ["full"]
    image: confluentinc/cp-kafka:7.6.1
    container_name: deadmile-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka-ui:
    profiles: ["full"]
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: deadmile-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: deadmile
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8090:8080"
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # Infrastructure — Workflow Orchestration
  # ===========================================================================
  temporal:
    profiles: ["full"]
    image: temporalio/auto-setup:1.25.2
    container_name: deadmile-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-deadmile}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-deadmile_secret_change_me}
      POSTGRES_SEEDS: postgres
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "tctl --address $$(hostname -i):7233 cluster health 2>/dev/null | grep -q SERVING"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  temporal-ui:
    profiles: ["full"]
    image: temporalio/ui:2.31.2
    container_name: deadmile-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8081:8080"
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ===========================================================================
  # Application Services
  # ===========================================================================
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: deadmile-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: api-gateway
      SERVICE_PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      API_GATEWAY_URL: http://api-gateway:8000
      AGENT_CORE_URL: http://agent-core:8001
      LOAD_INGESTION_URL: http://load-ingestion:8002
      LOAD_PROCESSOR_URL: http://load-processor:8003
      PROFITABILITY_ENGINE_URL: http://profitability-engine:8004
      MARKET_INTELLIGENCE_URL: http://market-intelligence:8005
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: load-chain-queue
    ports:
      - "${API_GATEWAY_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      profitability-engine:
        condition: service_started
      market-intelligence:
        condition: service_started
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  agent-core:
    build:
      context: .
      dockerfile: services/agent-core/Dockerfile
    container_name: deadmile-agent-core
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: agent-core
      SERVICE_PORT: 8001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_API_BASE: ${LLM_API_BASE:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: ${DATABASE_URL}
      API_GATEWAY_URL: http://api-gateway:8000
      PROFITABILITY_ENGINE_URL: http://profitability-engine:8004
      MARKET_INTELLIGENCE_URL: http://market-intelligence:8005
    ports:
      - "${AGENT_CORE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      profitability-engine:
        condition: service_healthy
      market-intelligence:
        condition: service_healthy
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  load-ingestion:
    profiles: ["full"]
    build:
      context: .
      dockerfile: services/load-ingestion/Dockerfile
    container_name: deadmile-load-ingestion
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: load-ingestion
      SERVICE_PORT: 8002
      DATA_TEXT_PATH: /data/text
      DATA_PDF_PATH: /data/pdf
      KAFKA_TOPIC_LOADS: raw-loads
    ports:
      - "${LOAD_INGESTION_PORT:-8002}:8002"
    volumes:
      - ./data:/data:ro
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  load-processor:
    profiles: ["full"]
    build:
      context: .
      dockerfile: services/load-processor/Dockerfile
    container_name: deadmile-load-processor
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: load-processor
      SERVICE_PORT: 8003
      KAFKA_TOPIC_LOADS: raw-loads
    ports:
      - "${LOAD_PROCESSOR_PORT:-8003}:8003"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  profitability-engine:
    build:
      context: .
      dockerfile: services/profitability-engine/Dockerfile
    container_name: deadmile-profitability-engine
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: profitability-engine
      SERVICE_PORT: 8004
      MARKET_INTELLIGENCE_URL: http://market-intelligence:8005
    ports:
      - "${PROFITABILITY_ENGINE_PORT:-8004}:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      market-intelligence:
        condition: service_healthy
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  market-intelligence:
    build:
      context: .
      dockerfile: services/market-intelligence/Dockerfile
    container_name: deadmile-market-intelligence
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: market-intelligence
      SERVICE_PORT: 8005
    ports:
      - "${MARKET_INTELLIGENCE_PORT:-8005}:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8010
        NEXT_PUBLIC_AGENT_URL: http://localhost:8001
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
        NEXT_PUBLIC_MAPTILER_KEY: ${NEXT_PUBLIC_MAPTILER_KEY:-}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-DeadMile AI}
    container_name: deadmile-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8010
      NEXT_PUBLIC_AGENT_URL: http://localhost:8001
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
      NEXT_PUBLIC_MAPTILER_KEY: ${NEXT_PUBLIC_MAPTILER_KEY:-}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-DeadMile AI}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-deadmile-dev-secret-change-in-production-min-32-chars}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # Infrastructure — Reverse Proxy & Monitoring
  # ===========================================================================
  nginx:
    profiles: ["full"]
    image: nginx:1.27-alpine
    container_name: deadmile-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      agent-core:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5

  prometheus:
    profiles: ["full"]
    image: prom/prometheus:v2.54.1
    container_name: deadmile-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5

  grafana:
    profiles: ["full"]
    image: grafana/grafana:11.3.0
    container_name: deadmile-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-deadmile_grafana_change_me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/deadmile.json
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - deadmile-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  deadmile-network:
    driver: bridge
    name: deadmile-network

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
  kafka-data:
  grafana-data:
  prometheus-data:
